<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipwright Command Center — Empty State</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-primary: #6b5e56;
    --color-primary-hover: #5a4f48;
    --color-bg: #f5f0eb;
    --color-surface: #ffffff;
    --color-muted-bg: #ede8e1;
    --color-text: #1a1a1a;
    --color-muted: #6b7280;
    --color-border: #e0dbd4;
    --color-accent: #857568;
    --color-success: #059669;
    --color-warning: #D97706;
    --color-error: #DC2626;
    --color-info: #3B82F6;
    --radius-card: 12px;
    --radius-button: 8px;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: var(--color-bg);
    color: var(--color-text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ============================================================
     SIDEBAR
     ============================================================ */
  .sidebar {
    width: 200px;
    min-width: 200px;
    background: #5c5652;
    display: flex;
    flex-direction: column;
    height: 100vh;
    z-index: 10;
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 16px 24px;
  }

  .sidebar-logo svg {
    width: 28px;
    height: 28px;
    color: #ffffff;
    flex-shrink: 0;
  }

  .sidebar-logo span {
    font-weight: 700;
    font-size: 16px;
    color: #ffffff;
    letter-spacing: -0.02em;
  }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 0 8px;
    flex: 1;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius-button);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    transition: all 0.15s ease;
    position: relative;
    text-decoration: none;
  }

  .nav-item:hover {
    background: rgba(255,255,255,0.08);
    color: #ffffff;
  }

  .nav-item.active {
    background: rgba(255,255,255,0.12);
    color: #ffffff;
  }

  .nav-item svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .nav-badge {
    margin-left: auto;
    background: var(--color-error);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    min-width: 18px;
    height: 18px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
  }

  /* ============================================================
     MAIN AREA
     ============================================================ */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .empty-content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .empty-card {
    text-align: center;
    max-width: 420px;
    padding: 48px 32px;
  }

  .empty-icon {
    width: 64px;
    height: 64px;
    color: var(--color-accent);
    margin: 0 auto 28px;
    opacity: 0.7;
  }

  .empty-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--color-text);
    margin-bottom: 10px;
    letter-spacing: -0.02em;
  }

  .empty-subtitle {
    font-size: 14px;
    color: var(--color-muted);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .btn-create {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    border-radius: var(--radius-button);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    border: none;
    background: var(--color-primary);
    color: #fff;
    margin-bottom: 36px;
  }

  .btn-create:hover {
    background: var(--color-primary-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(107, 94, 86, 0.3);
  }

  .btn-create svg {
    width: 18px;
    height: 18px;
  }

  .divider {
    width: 200px;
    height: 1px;
    background: var(--color-border);
    margin: 0 auto 28px;
  }

  .quickstart-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--color-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 16px;
  }

  .quickstart-steps {
    list-style: none;
    text-align: left;
    display: inline-block;
  }

  .quickstart-steps li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 0;
    font-size: 14px;
    color: var(--color-text);
    line-height: 1.5;
  }

  .step-number {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--color-muted-bg);
    color: var(--color-primary);
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- ============================================================
     SIDEBAR
     ============================================================ -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/>
      <line x1="12" y1="3" x2="12" y2="21"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="5.6" y1="5.6" x2="18.4" y2="18.4"/>
      <line x1="18.4" y1="5.6" x2="5.6" y2="18.4"/>
    </svg>
    <span>Shipwright</span>
  </div>

  <nav class="sidebar-nav">
    <a class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Task Board
    </a>
    <a class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7h18M3 12h18M3 17h18"/>
      </svg>
      Projects
    </a>
    <a class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
      </svg>
      Inbox
      <span class="nav-badge">2</span>
    </a>
    <a class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Settings
    </a>
  </nav>
</aside>

<!-- ============================================================
     MAIN — EMPTY STATE
     ============================================================ -->
<div class="main">
  <div class="empty-content">
    <div class="empty-card">
      <!-- Ship wheel icon -->
      <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <circle cx="12" cy="12" r="2.5"/>
        <line x1="12" y1="3" x2="12" y2="9.5"/>
        <line x1="12" y1="14.5" x2="12" y2="21"/>
        <line x1="3" y1="12" x2="9.5" y2="12"/>
        <line x1="14.5" y1="12" x2="21" y2="12"/>
        <line x1="5.6" y1="5.6" x2="10.2" y2="10.2"/>
        <line x1="13.8" y1="13.8" x2="18.4" y2="18.4"/>
        <line x1="18.4" y1="5.6" x2="13.8" y2="10.2"/>
        <line x1="10.2" y1="13.8" x2="5.6" y2="18.4"/>
      </svg>

      <h1 class="empty-title">Welcome to Shipwright</h1>
      <p class="empty-subtitle">
        Create your first project to get started.<br>
        Shipwright will handle the rest.
      </p>

      <button class="btn-create">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Create Project
      </button>

      <div class="divider"></div>

      <div class="quickstart-title">Quick Start</div>
      <ol class="quickstart-steps">
        <li>
          <span class="step-number">1</span>
          Click "Create Project"
        </li>
        <li>
          <span class="step-number">2</span>
          Choose your stack
        </li>
        <li>
          <span class="step-number">3</span>
          Watch Claude build it
        </li>
      </ol>
    </div>
  </div>
</div>

</body>
</html>
