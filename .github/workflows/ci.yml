name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN (OpenSSF Scorecard Token-Permissions): this
# workflow only reads — checkout + lint + tests, no writes — so the top-level
# token is read-only and no job widens it.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-checks:
    # Type-checking is a deliberate won't-do for this repo (see dismissed
    # triage trg-84f204ba), so the job name does not claim it.
    name: Python (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Diff-coverage roadmap Phase 1: the "Diff coverage" step compares the
          # working tree against origin/main, so it needs the merge-base. The
          # default depth-1 checkout has no history — fetch it all.
          fetch-depth: 0

      - name: Install uv
        # Third-party action pinned to a full commit SHA (supply-chain
        # hardening): a mutable tag like @v3 can be repointed by the upstream
        # owner. The trailing comment records the human-readable tag.
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Install root dependencies
        run: uv sync

      - name: Lint (ruff)
        # Bug-focused, GATING lint. The curated ruleset lives in the root
        # pyproject.toml ([tool.ruff.lint]). Run via uvx with a pinned ruff
        # version (ruff is not a project dependency, and pinning prevents a
        # new ruff release from silently breaking the gate). This step gates:
        # no `|| true`, no `continue-on-error`.
        run: uvx ruff@0.15.15 check .

      # OSS security scanners — the shipwright-security plugin's
      # test_oss_backend_smoke.py smoke tests hard-fail in CI when these
      # binaries are absent (ADR-044). The plugin-test loop below runs every
      # plugin's suite, so CI needs the scanners on PATH. Mirrors security.yml.
      - name: Install Semgrep
        run: pip install semgrep

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Install Gitleaks
        shell: bash
        run: |
          # Download to disk + verify SHA256 before extracting (supply-chain
          # integrity): the old `wget | tar` piped an unverified tarball
          # straight into extraction. `shell: bash` (set above) runs with
          # `-eo pipefail`, so a checksum mismatch anywhere in a pipeline
          # aborts the step (the implicit default shell is only `bash -e`).
          GITLEAKS_VERSION="8.21.2"
          GITLEAKS_SHA256="5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba"
          TARBALL="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          wget -qO "$TARBALL" "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${TARBALL}"
          echo "${GITLEAKS_SHA256}  ${TARBALL}" | sha256sum -c -
          tar xzf "$TARBALL"
          sudo mv gitleaks /usr/local/bin/
          rm -f "$TARBALL"
          gitleaks version

      - name: Run plugin tests
        shell: bash
        run: |
          set -e
          # Diff-coverage roadmap Phase 2: this is the FIRST coverage-producing
          # tier, so clear stale coverage state once here (a later per-tier `rm`
          # would wipe earlier tiers' data). Each plugin's scripts/ source is
          # measured into its own .cov-data/.coverage.<name> file; combine_coverage
          # folds them into one repo-relative coverage.xml after all tiers run.
          rm -rf .cov-data coverage.xml
          mkdir -p .cov-data
          ROOT="$PWD"
          for plugin in plugins/*/; do
            if [ -f "$plugin/pyproject.toml" ] && [ -d "$plugin/tests" ]; then
              name=$(basename "$plugin")
              echo "--- Running tests in $plugin ---"
              # Plugins declare pytest as an optional `dev` extra (or not at
              # all), so a plain `uv sync` does not install it. `uv run --with`
              # provisions pytest + pytest-mock on top of the plugin's own env.
              if [ -d "$plugin/scripts" ]; then
                # Plugin suites run `cd "$plugin"` in their own uv env, so
                # coverage records plugin-CWD-relative `scripts/...` paths.
                # --cov-config pins the root pyproject so relative_files is
                # honoured (coverage does NOT search parent dirs for config);
                # combine_coverage.py later remaps `scripts/...` ->
                # `plugins/<name>/scripts/...`. Additive; never gates this step.
                (cd "$plugin" && COVERAGE_FILE="$ROOT/.cov-data/.coverage.$name" \
                  uv run --with pytest --with pytest-mock --with pytest-cov \
                  pytest tests/ -v \
                  --cov=scripts --cov-config="$ROOT/pyproject.toml" --cov-report=)
              else
                # No scripts/ dir (e.g. shipwright-preview) — run tests, no cov.
                (cd "$plugin" && uv run --with pytest --with pytest-mock pytest tests/ -v)
              fi
            fi
          done

      - name: Run shared tests
        shell: bash
        run: |
          set -e
          # The shared/ suites historically NEVER ran in CI — only
          # plugins/*/tests/ + integration-tests/ did — which is how regressions
          # under shared/ rotted unseen (iterate-2026-05-31-ci-shared-tests).
          #
          # They must run as SEPARATE per-dir invocations: shared/tests/ and
          # shared/scripts/tests/ are each their own top-level `tests` package
          # (each carries __init__.py + a conftest.py), so collecting more than
          # one in ONE pytest process collides on the duplicate top-level
          # package name (ModuleNotFoundError / ImportPathMismatchError on
          # `tests.conftest`). One process per dir = one `tests` package = no
          # collision. Same pattern as the per-plugin loop above. The root
          # pyproject.toml supplies `-m 'not slow'` + pythonpath, so no extra
          # flags are needed here.
          # `not cross_plugin`: tests importing another plugin's lib/tools
          # collide on the shared `tests`/`lib` namespace from a shared/tests
          # session and hard-fail in CI by design (ADR-044 / test_hygiene
          # .import_or_fail_in_ci) — they run under their owning plugin's
          # session via the per-plugin loop above. A command-line `-m` replaces
          # the pyproject `-m 'not slow'`, so restate `not slow` here.
          #
          # Diff-coverage roadmap Phase 2: measure the shared/ tier into its own
          # per-tier data file (.cov-data/.coverage.shared). Run from the repo
          # root, so coverage records repo-relative `shared/...` paths (no remap
          # needed at combine time). --cov-append accumulates across the three
          # separate pytest processes; --cov-config pins the root pyproject
          # (relative_files + test omit). The stale-state clear + the combined
          # `coverage xml` now live in the plugin-tests and Combine steps
          # respectively. Coverage is additive and never gates this step;
          # --cov-report= silences the per-run terminal table.
          # --with diff-cover: the diff-coverage GATE fail-path integration test
          # (shared/scripts/tools/tests/test_measure_diff_coverage_gate.py, Phase-4
          # hardening) drives the real diff-cover against a synthetic repo to prove
          # the gate bites. Pinned so a release can't change flags/exit codes; the
          # test HARD-FAILS in CI if diff-cover is absent (silent-skip discipline).
          export COVERAGE_FILE="$PWD/.cov-data/.coverage.shared"
          for dir in shared/tests shared/scripts/tests shared/scripts/tools/tests; do
            echo "--- Running tests in $dir ---"
            uv run --with pytest --with pytest-mock --with pytest-cov \
              --with "diff-cover==10.3.0" \
              pytest "$dir" -v -m "not slow and not cross_plugin" \
              --cov=shared --cov-append --cov-config="$PWD/pyproject.toml" --cov-report=
          done

      - name: Run integration tests
        # Diff-coverage roadmap Phase 2: integration-tests exercise the shared/
        # cross-plugin machinery from the repo root (repo-relative `shared/...`
        # paths -> no remap). Measured into its own per-tier data file so it
        # contributes to the combined coverage.xml below. Must run BEFORE the
        # Combine step. Coverage additive; never gates.
        shell: bash
        run: |
          if [ -d integration-tests ]; then
            COVERAGE_FILE="$PWD/.cov-data/.coverage.integration" \
              uv run --with pytest --with pytest-mock --with pytest-cov \
              pytest integration-tests/ -v \
              --cov=shared --cov-config="$PWD/pyproject.toml" --cov-report=
          fi

      - name: Combine coverage
        # Diff-coverage roadmap Phase 2: fold every per-tier data file in
        # .cov-data/ (shared + integration + each plugin) into ONE repo-relative
        # coverage.xml. combine_coverage.py remaps each plugin's scripts/-relative
        # data to plugins/<name>/scripts/ — a single global `coverage combine`
        # [paths] mapping cannot, because the plugin identity is lost in the
        # plugin-CWD-relative data files (see the tool docstring). Absent-safe;
        # never gates. This produces the coverage.xml the Diff coverage step and
        # the coverage.total recorder consume.
        #
        # always(): still combine whatever tiers succeeded even when an earlier
        # test tier failed the job, so the coverage artifact is available for
        # debugging (matches the Upload step below). The failing test step keeps
        # the job red on its own — this never masks a failure, it only preserves
        # the diagnostic. combine_coverage is absent-safe (n/a, exit 0) with no
        # data, so a job that failed before any tier ran stays clean here.
        if: always()
        shell: bash
        run: |
          uv run --with coverage shared/scripts/tools/combine_coverage.py \
            --project-root . --data-dir .cov-data --output coverage.xml

      - name: Diff coverage (warn-only gate)
        # Diff-coverage roadmap Phase 4 (warn-only), hardened
        # (iterate-2026-07-06-diff-coverage-gate-hardening): the gate DECISION —
        # measure the % of CHANGED lines (vs origin/main) that tests execute over
        # the COMBINED coverage.xml, print the markdown report, and exit non-zero
        # iff diff% < 80 — now lives in a unit/integration-TESTED Python
        # entrypoint (measure_diff_coverage.py --fail-under), NOT inline shell, so
        # the fail-path is provable (test_measure_diff_coverage_gate.py drives the
        # real diff-cover). The wrapper runs diff-cover internally with the
        # non-deprecated --format flags. continue-on-error stays TRUE for the
        # ~1-2 week settling window (anti-ratchet discipline), so an under-tested
        # PR shows a visible FAILURE on this step but does NOT block merge yet; the
        # hard flip drops continue-on-error AND the ci_gate_allowlist entry below.
        # 80 == control_grade._DIFF_COV_WARN_THRESHOLD (Phase-3 grade WARN). The
        # CI-gate guard still classifies this as a gate: `measure_diff_coverage` is
        # in GATE_COMMANDS (and `diff-cover` is named below). Skipped when Combine
        # produced no coverage.xml.
        if: hashFiles('coverage.xml') != ''
        continue-on-error: true
        shell: bash
        run: |
          # origin/main is the diff base; fetch it explicitly (fetch-depth:0 has
          # history but not necessarily the ref).
          git fetch --no-tags origin main
          # The wrapper prints the markdown report and returns non-zero iff
          # diff% < 80. Capture that under `bash -eo pipefail` (|| rc=$?) and
          # re-raise it as the step result (continue-on-error downgrades it to a
          # warning). diff-cover is PINNED so a release can't silently change its
          # flags/exit codes.
          echo "::group::Diff coverage (warn-only gate, --fail-under=80)"
          rc=0
          uv run --with "diff-cover==10.3.0" \
            shared/scripts/tools/measure_diff_coverage.py \
            --project-root . --coverage-xml coverage.xml \
            --compare-branch origin/main --fail-under 80 \
            --json-out diff-cover.json --markdown-out diff-cover.md || rc=$?
          echo "::endgroup::"
          exit "$rc"

      - name: Upload coverage artifacts
        # Non-gating housekeeping: keep coverage.xml + the diff-cover reports for
        # inspection. always() so a failed earlier step still publishes them.
        if: always() && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: repo-diff-coverage
          path: |
            coverage.xml
            diff-cover.json
            diff-cover.md
          if-no-files-found: ignore

      - name: Run CI-gate guard
        # Fails if a test dir is silently uncovered, a quality gate goes loose
        # outside the documented allowlist, or the security critical-gate loses
        # its fail-closed missing-findings guard. See
        # shared/scripts/tools/check_ci_gate_coverage.py.
        run: uv run shared/scripts/tools/check_ci_gate_coverage.py --project-root .

  # WebUI client + server checks moved to
  # https://github.com/svenroth-ai/shipwright-webui/blob/main/.github/workflows/ci.yml
  # when the WebUI was extracted into its own repo (v0.4.0, 2026-04-24).
