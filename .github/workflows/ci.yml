name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-checks:
    name: Python (lint + type + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Install root dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check . || true
        continue-on-error: true

      # OSS security scanners — the shipwright-security plugin's
      # test_oss_backend_smoke.py smoke tests hard-fail in CI when these
      # binaries are absent (ADR-044). The plugin-test loop below runs every
      # plugin's suite, so CI needs the scanners on PATH. Mirrors security.yml.
      - name: Install Semgrep
        run: pip install semgrep

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          wget -qO- "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Run plugin tests
        shell: bash
        run: |
          set -e
          for plugin in plugins/*/; do
            if [ -f "$plugin/pyproject.toml" ] && [ -d "$plugin/tests" ]; then
              echo "--- Running tests in $plugin ---"
              # Plugins declare pytest as an optional `dev` extra (or not at
              # all), so a plain `uv sync` does not install it. `uv run --with`
              # provisions pytest + pytest-mock on top of the plugin's own env.
              (cd "$plugin" && uv run --with pytest --with pytest-mock pytest tests/ -v)
            fi
          done

      - name: Run shared tests (non-gating, tracked-debt)
        shell: bash
        # NON-GATING (tracked-debt). shared/**/tests carries Linux-portability
        # debt from Windows-only development: leaked `os.name='nt'` monkeypatches
        # crash pytest's failure reporter on the ubuntu runner (it builds a
        # WindowsPath), and some tests assume gitignored main-tree staging that
        # a clean checkout lacks. Each dir runs as its own session (`shared/tests`
        # + `shared/scripts/tests` share basenames that collide in one
        # collection) and is wrapped in `|| true` so the suite runs for
        # VISIBILITY without gating CI until a follow-up iterate makes it
        # Linux-CI-clean. This loose gate is documented in LOOSE_GATE_ALLOWLIST
        # (ci.yml / this step); when the debt is cleared the entry goes stale and
        # the CI-gate guard forces removal of the `|| true`. The dirs stay
        # REFERENCED so guard check (a) still catches a NEW uncovered shared dir.
        run: |
          for d in shared/tests shared/scripts/tests shared/scripts/tools/tests; do
            echo "--- Running tests in $d (non-gating) ---"
            uv run --with pytest --with pytest-mock pytest "$d" -v || true
          done

      - name: Run integration tests
        run: |
          if [ -d integration-tests ]; then
            uv run --with pytest --with pytest-mock pytest integration-tests/ -v
          fi

      - name: Run CI-gate guard
        # Fails if a test dir is silently uncovered, a quality gate goes loose
        # outside the documented allowlist, or the security critical-gate loses
        # its fail-closed missing-findings guard. See
        # shared/scripts/tools/check_ci_gate_coverage.py.
        run: uv run shared/scripts/tools/check_ci_gate_coverage.py --project-root .

  # WebUI client + server checks moved to
  # https://github.com/svenroth-ai/shipwright-webui/blob/main/.github/workflows/ci.yml
  # when the WebUI was extracted into its own repo (v0.4.0, 2026-04-24).
