name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN (OpenSSF Scorecard Token-Permissions): this
# workflow only reads — checkout + lint + tests, no writes — so the top-level
# token is read-only and no job widens it.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-checks:
    # Type-checking is a deliberate won't-do for this repo (see dismissed
    # triage trg-84f204ba), so the job name does not claim it.
    name: Python (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        # Third-party action pinned to a full commit SHA (supply-chain
        # hardening): a mutable tag like @v3 can be repointed by the upstream
        # owner. The trailing comment records the human-readable tag.
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Install root dependencies
        run: uv sync

      - name: Lint (ruff)
        # Bug-focused, GATING lint. The curated ruleset lives in the root
        # pyproject.toml ([tool.ruff.lint]). Run via uvx with a pinned ruff
        # version (ruff is not a project dependency, and pinning prevents a
        # new ruff release from silently breaking the gate). This step gates:
        # no `|| true`, no `continue-on-error`.
        run: uvx ruff@0.15.15 check .

      # OSS security scanners — the shipwright-security plugin's
      # test_oss_backend_smoke.py smoke tests hard-fail in CI when these
      # binaries are absent (ADR-044). The plugin-test loop below runs every
      # plugin's suite, so CI needs the scanners on PATH. Mirrors security.yml.
      - name: Install Semgrep
        run: pip install semgrep

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Install Gitleaks
        shell: bash
        run: |
          # Download to disk + verify SHA256 before extracting (supply-chain
          # integrity): the old `wget | tar` piped an unverified tarball
          # straight into extraction. `shell: bash` (set above) runs with
          # `-eo pipefail`, so a checksum mismatch anywhere in a pipeline
          # aborts the step (the implicit default shell is only `bash -e`).
          GITLEAKS_VERSION="8.21.2"
          GITLEAKS_SHA256="5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba"
          TARBALL="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          wget -qO "$TARBALL" "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${TARBALL}"
          echo "${GITLEAKS_SHA256}  ${TARBALL}" | sha256sum -c -
          tar xzf "$TARBALL"
          sudo mv gitleaks /usr/local/bin/
          rm -f "$TARBALL"
          gitleaks version

      - name: Run plugin tests
        shell: bash
        run: |
          set -e
          for plugin in plugins/*/; do
            if [ -f "$plugin/pyproject.toml" ] && [ -d "$plugin/tests" ]; then
              echo "--- Running tests in $plugin ---"
              # Plugins declare pytest as an optional `dev` extra (or not at
              # all), so a plain `uv sync` does not install it. `uv run --with`
              # provisions pytest + pytest-mock on top of the plugin's own env.
              (cd "$plugin" && uv run --with pytest --with pytest-mock pytest tests/ -v)
            fi
          done

      - name: Run shared tests
        shell: bash
        run: |
          set -e
          # The shared/ suites historically NEVER ran in CI — only
          # plugins/*/tests/ + integration-tests/ did — which is how regressions
          # under shared/ rotted unseen (iterate-2026-05-31-ci-shared-tests).
          #
          # They must run as SEPARATE per-dir invocations: shared/tests/ and
          # shared/scripts/tests/ are each their own top-level `tests` package
          # (each carries __init__.py + a conftest.py), so collecting more than
          # one in ONE pytest process collides on the duplicate top-level
          # package name (ModuleNotFoundError / ImportPathMismatchError on
          # `tests.conftest`). One process per dir = one `tests` package = no
          # collision. Same pattern as the per-plugin loop above. The root
          # pyproject.toml supplies `-m 'not slow'` + pythonpath, so no extra
          # flags are needed here.
          # `not cross_plugin`: tests importing another plugin's lib/tools
          # collide on the shared `tests`/`lib` namespace from a shared/tests
          # session and hard-fail in CI by design (ADR-044 / test_hygiene
          # .import_or_fail_in_ci) — they run under their owning plugin's
          # session via the per-plugin loop above. A command-line `-m` replaces
          # the pyproject `-m 'not slow'`, so restate `not slow` here.
          for dir in shared/tests shared/scripts/tests shared/scripts/tools/tests; do
            echo "--- Running tests in $dir ---"
            uv run --with pytest --with pytest-mock pytest "$dir" -v -m "not slow and not cross_plugin"
          done

      - name: Run integration tests
        run: |
          if [ -d integration-tests ]; then
            uv run --with pytest --with pytest-mock pytest integration-tests/ -v
          fi

      - name: Run CI-gate guard
        # Fails if a test dir is silently uncovered, a quality gate goes loose
        # outside the documented allowlist, or the security critical-gate loses
        # its fail-closed missing-findings guard. See
        # shared/scripts/tools/check_ci_gate_coverage.py.
        run: uv run shared/scripts/tools/check_ci_gate_coverage.py --project-root .

  # WebUI client + server checks moved to
  # https://github.com/svenroth-ai/shipwright-webui/blob/main/.github/workflows/ci.yml
  # when the WebUI was extracted into its own repo (v0.4.0, 2026-04-24).
