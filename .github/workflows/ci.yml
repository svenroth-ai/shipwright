name: CI

# DORMANT: Auto-triggers are disabled until Phase B (Go-Live).
# To activate: uncomment the pull_request and push triggers below.
on:
  # pull_request:
  #   branches: [main]
  # push:
  #   branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-checks:
    name: Python (lint + type + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Install root dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check . || true
        continue-on-error: true

      - name: Run plugin tests
        shell: bash
        run: |
          set -e
          for plugin in plugins/*/; do
            if [ -f "$plugin/pyproject.toml" ] && [ -d "$plugin/tests" ]; then
              echo "--- Running tests in $plugin ---"
              (cd "$plugin" && uv sync && uv run pytest tests/ -v)
            fi
          done

      - name: Run integration tests
        run: |
          if [ -d integration-tests ]; then
            uv run pytest integration-tests/ -v || true
          fi

  webui-client-checks:
    name: WebUI client (lint + type + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui/client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webui/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx oxlint . || true
        continue-on-error: true

      - name: Run tests
        run: npm test -- --run

  webui-server-checks:
    name: WebUI server (lint + type + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui/server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webui/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --run || true
