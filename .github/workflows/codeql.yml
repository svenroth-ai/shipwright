name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN (OpenSSF Scorecard Token-Permissions): read-only
# default for any future job; the analyze job below widens itself to the exact
# scopes codeql-action needs (security-events: write for the SARIF upload).
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          # Monorepo-only tailoring: keep the full security + high-value
          # correctness net, exclude only ruff-owned / convention-conflicting
          # quality queries. See .github/codeql/codeql-config.yml for the
          # per-exclusion rationale. (Not scaffolded into adopted repos.)
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform analysis
        # continue-on-error: a private repo without GitHub code scanning
        # (Advanced Security) fails the SARIF upload with "Advanced Security
        # must be enabled for this repository". The QL analysis still runs;
        # once the repo is public, code scanning is available for free and
        # this step succeeds normally. Mirrors the guard security.yml carries
        # on its upload-sarif step.
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          category: "/language:${{ matrix.language }}"
