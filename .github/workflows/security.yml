name: Security Scan

# Fork PRs: SARIF upload + PR comment are skipped via a repo-equality guard.
# SARIF from all three OSS scanners uploads to the GitHub Security tab
# (category: shipwright-security).
on:
  pull_request:
    branches: [main]
  push:
    # Full scan on every merge to main so the security-scan-results artifact
    # (read by the github_triage producer via latest_security_workflow_run)
    # tracks HEAD. Without this, main was only re-scanned weekly, so a finding
    # fixed between weekly scans re-surfaced from the stale artifact for up to 7
    # days (iterate-2026-07-02-gh-prompt-ghost-fix). This repo is public ⇒
    # Actions minutes are free; the `concurrency` block below cancels superseded
    # runs. NOTE: deliberately NOT added to the adopt template
    # (shared/templates/github-actions/security.yml.template) — adopted repos may
    # be private, where per-push scans cost minutes; they keep weekly + PR.
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC — weekly full scan
  workflow_dispatch:

# Intentionally TOP-LEVEL — unlike the sibling workflows (ci/codeql/bloat-check/
# pr-review), which keep a read-only top-level and widen per-job. This single-job
# SARIF workflow is convention-locked: the compliance A5.3 audit
# (security_workflow.REQUIRED_PERMISSIONS) reads the *top-level* `permissions:`
# block to confirm the SARIF upload can run. With one job, top-level == job-level
# effective scope, so there is no least-privilege loss from keeping it here. Do
# NOT move these to the `scan` job without first teaching A5.3 to read the SARIF
# job's effective (job-level) permissions, or the audit fails closed.
permissions:
  contents: read
  actions: read          # required by github/codeql-action/upload-sarif@v4 to attach SARIF to the run
  pull-requests: write   # to post PR comments
  security-events: write # required by github/codeql-action/upload-sarif@v4

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Shipwright Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for diff against origin/main

      - name: Install uv
        # Third-party action pinned to a full commit SHA (supply-chain
        # hardening); trailing comment records the human-readable tag.
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Install shipwright-security dependencies
        working-directory: plugins/shipwright-security
        run: uv sync

      # --- OSS scanner installation ---

      - name: Install Semgrep
        run: pip install semgrep

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Install Gitleaks
        shell: bash
        run: |
          # Download to disk + verify SHA256 before extracting (supply-chain
          # integrity): the old `wget | tar` piped an unverified tarball
          # straight into extraction. `shell: bash` (set above) runs with
          # `-eo pipefail`, so a checksum mismatch anywhere in a pipeline
          # aborts the step (the implicit default shell is only `bash -e`).
          GITLEAKS_VERSION="8.21.2"
          GITLEAKS_SHA256="5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba"
          TARBALL="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          wget -qO "$TARBALL" "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${TARBALL}"
          echo "${GITLEAKS_SHA256}  ${TARBALL}" | sha256sum -c -
          tar xzf "$TARBALL"
          sudo mv gitleaks /usr/local/bin/
          rm -f "$TARBALL"
          gitleaks version

      # --- Run scans ---

      - name: Run OSS security scan (Semgrep + Trivy + Gitleaks)
        working-directory: plugins/shipwright-security
        env:
          # Scope this self-scan to shipped code. The security plugin's own
          # test suites (plugins/*/tests, shared/tests) carry SYNTHETIC
          # secrets by design — redaction/detection/hook tests need sample
          # API keys, GitHub PATs, Slack tokens and PEM markers as fixtures.
          # Now that the Gitleaks leg actually works (the `--report-path -`
          # fix, iterate-2026-06-05-gitleaks-report-path), those synthetic
          # fixtures surface as 14 false-positive findings (3 critical).
          # Excluding the `tests` path-segment from the scan keeps the gate
          # focused on shipped plugin code (tests are not distributed). A
          # real leak in test code is still caught by the check_secrets.sh
          # pre-commit hook + review. trg-190ff3b9 tracks a finer-grained
          # per-secret allowlist as a possible future refinement.
          SHIPWRIGHT_SCAN_EXCLUDES: tests
        run: |
          uv run scripts/tools/scan.py \
            --path ../.. \
            --output ${{ github.workspace }}/findings.json \
            --scan-types sast,sca,secret-detection \
            --repo "${{ github.repository }}"
        continue-on-error: true  # don't fail the step; let the threshold check decide

      - name: Generate SARIF outputs
        working-directory: plugins/shipwright-security
        run: |
          uv run scripts/tools/scan.py \
            --path ../.. \
            --input-from-cache ${{ github.workspace }}/findings.json \
            --sarif-dir ${{ github.workspace }}/sarif \
            --repo "${{ github.repository }}"
        continue-on-error: true

      - name: Run Prompt Injection scan
        working-directory: plugins/shipwright-security
        env:
          # Hoist github context into env vars so the run: body never
          # interpolates ${{ github.* }} directly — guards against
          # run-shell-injection (semgrep yaml.github-actions.security.
          # run-shell-injection.run-shell-injection). github.base_ref is
          # an untrusted user-controlled ref name on pull_request events.
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          WORKSPACE: ${{ github.workspace }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            uv run scripts/tools/prompt_injection_scan.py \
              --diff "origin/$BASE_REF" \
              --path ../.. \
              --output "$WORKSPACE/prompt_risks.json" \
              --repo "$REPO"
          else
            uv run scripts/tools/prompt_injection_scan.py \
              --full \
              --path ../.. \
              --output "$WORKSPACE/prompt_risks.json" \
              --repo "$REPO"
          fi
        continue-on-error: true

      - name: Generate combined report
        working-directory: plugins/shipwright-security
        run: |
          uv run scripts/tools/generate_security_report.py \
            --input ${{ github.workspace }}/findings.json \
            --prompt-risks ${{ github.workspace }}/prompt_risks.json \
            --output ${{ github.workspace }}/report.md \
            --repo "${{ github.repository }}" \
            --pr-mode

      # --- Upload SARIF and post PR comment (with fork-PR guards) ---
      #
      # Fork-PR guard: PRs from forks run with a read-only GITHUB_TOKEN, so
      # security-events:write and pull-requests:write are not granted. Both
      # steps below are skipped on fork PRs (`head.repo.full_name` differs from
      # the workflow's repository). Same-repo PRs, workflow_dispatch, and
      # schedule events still upload SARIF and (for PR events) post comments.

      - name: Upload SARIF to GitHub Security
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        # `continue-on-error: true` so this step never gates the workflow on
        # private repos without GitHub Advanced Security (the API returns
        # "Advanced Security must be enabled" and would otherwise fail-close
        # the run). Findings still land in findings.json + the SARIF
        # artifact + the critical-gate. v4 of the action (v3 deprecation
        # lands 2026-12). Mirrors shared/templates/github-actions/security.yml.template.
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: ${{ github.workspace }}/sarif
          category: shipwright-security

      - name: Post PR comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        # Third-party action pinned to a full commit SHA (supply-chain
        # hardening); trailing comment records the human-readable tag.
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043  # v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: ${{ github.workspace }}/report.md
          edit-mode: replace

      - name: Check for critical findings
        id: shipwright-critical-gate
        shell: bash
        run: |
          set -e
          # Fail CLOSED if the primary scan produced no output. A missing or
          # corrupt findings.json means the scanner crashed; reading it as
          # "0 criticals" (the old `2>/dev/null || echo 0`) would let a broken
          # scan pass green. Silent-green regression fixed in
          # iterate-2026-05-31-ci-gate-guard; enforced going forward by
          # shared/scripts/tools/check_ci_gate_coverage.py (check (c)).
          if [ ! -f findings.json ]; then
            echo "::error::findings.json is absent — the security scan produced no output (scanner crash?). Failing closed."
            exit 1
          fi
          if ! jq empty findings.json 2>/dev/null; then
            echo "::error::findings.json is present but not valid JSON — failing closed."
            exit 1
          fi
          # Fail CLOSED on a DEGRADED scan: a scanner leg (gitleaks/semgrep/
          # trivy) that fataled or produced a truncated report writes
          # `degraded: true` + `scan_errors` into findings.json. Its findings
          # are [] — so the critical count below would read 0 and pass green
          # (same failure class as iterate-2026-06-05-gitleaks-report-path).
          # The scan step is continue-on-error, so scan.py's exit code is
          # ignored here; this jq read is the enforcement.
          degraded=$(jq -r '.degraded // false' findings.json)
          if [ "$degraded" = "true" ]; then
            echo "::error::Security scan DEGRADED — a scanner failed to produce parseable output. Failing closed."
            jq -c '.scan_errors // []' findings.json
            exit 1
          fi
          critical=$(jq '[.findings[]? | select(.severity == "critical")] | length' findings.json)
          # prompt_risks.json is a softer signal: warn loudly if absent, don't block.
          if [ ! -f prompt_risks.json ]; then
            echo "::warning::prompt_risks.json is absent — prompt-injection scan did not run; treating as 0 prompt-critical."
            prompt_critical=0
          else
            prompt_critical=$(jq '[.findings[]? | select(.severity == "critical")] | length' prompt_risks.json)
          fi
          total=$((critical + prompt_critical))
          echo "Critical findings: $total"
          if [ "$total" -gt 0 ]; then
            echo "::error::Found $total critical security findings — blocking merge"
            exit 1
          fi

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            findings.json
            prompt_risks.json
            report.md
            sarif/
          retention-days: 30
