# Shipwright Dependabot configuration
#
# DORMANT MODE: open-pull-requests-limit is set to 0 for all ecosystems
# until Phase B (Go-Live). Dependabot builds its internal dependency graph
# but opens zero PRs, so it does not spam the maintainer during active
# development. To activate: change all `open-pull-requests-limit: 0`
# entries to `5` (or your preferred limit).

version: 2
updates:
  # ------------------------------------------------------------------
  # Python — root project
  # ------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # ------------------------------------------------------------------
  # Python — individual plugins
  # ------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/plugins/shipwright-build"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels: ["dependencies", "python", "plugin"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

